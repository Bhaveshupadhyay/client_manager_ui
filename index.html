<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Client Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header / Theme Toggle -->
        <header class="chat-header">
            <div class="date-divider">Today</div>
            <button id="theme-toggle" title="Toggle Dark/Light Mode">
                <svg id="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg id="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
        </header>

        <!-- Chat History -->
        <div class="chat-history" id="chat-history">
            <div class="message ai-message-row">
                <div class="avatar ai-avatar">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 9l1.25-2.75L23 5l-2.75-1.25L19 1l-1.25 2.75L15 5l2.75 1.25L19 9zm-7.5.5L9 4 6.5 9.5 1 12l5.5 2.5L9 20l2.5-5.5L17 12l-5.5-2.5zM19 15l-1.25 2.75L15 19l2.75 1.25L19 23l1.25-2.75L23 19l-2.75-1.25L19 15z"/>
                    </svg>
                </div>
                <div class="message-wrapper">
                    <span class="sender-name">Bhavesh</span>
                    <div class="bubble-and-time">
                        <div class="bubble ai-bubble">
                            Hi! 👋 I'm Bhavesh can you tell describe your requirements?
                        </div>
                        <span class="timestamp">Just now</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-branding">
            Ai powered client manager
        </div>

        <!-- Input Area -->
        <div class="input-container">
            <div class="input-box">
                <textarea id="chat-input" placeholder="Type a message..." rows="1"></textarea>
                <button id="send-btn" title="Send message">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
